<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
overflow:hidden;

/* Faster animated background */

background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1c92d2);
background-size:600% 600%;
animation:bgMove 6s linear infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Floating Clouds */

.cloud{
position:absolute;
background:white;
border-radius:50px;
opacity:0.15;
animation:cloudMove linear infinite;
}

.cloud:before,
.cloud:after{
content:"";
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:200px;
height:60px;
top:20%;
left:-250px;
animation-duration:25s;
}

.cloud1:before{
width:80px;
height:80px;
top:-40px;
left:30px;
}

.cloud1:after{
width:100px;
height:100px;
top:-50px;
right:30px;
}

.cloud2{
width:250px;
height:70px;
top:60%;
left:-300px;
animation-duration:35s;
}

.cloud2:before{
width:90px;
height:90px;
top:-45px;
left:40px;
}

.cloud2:after{
width:110px;
height:110px;
top:-55px;
right:40px;
}

@keyframes cloudMove{
0%{transform:translateX(0)}
100%{transform:translateX(160vw)}
}

/* Login Card */

.card{

width:460px;
padding:55px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

border-radius:20px;

box-shadow:0 30px 70px rgba(0,0,0,0.6);

border:1px solid rgba(255,255,255,0.2);

text-align:center;
color:white;
}

/* Title */

h2{
font-size:34px;
margin-bottom:35px;
letter-spacing:1px;
color:white;
}

/* Inputs */

input{
width:100%;
padding:18px;
margin:12px 0;

border-radius:10px;
border:none;

font-size:16px;

background:rgba(255,255,255,0.9);
}

/* Login Button */

.login-btn{

width:100%;
padding:18px;
margin-top:15px;

font-size:18px;
font-weight:bold;

border:none;
border-radius:10px;

color:white;

background:linear-gradient(270deg,#00c6ff,#0072ff,#00c6ff);
background-size:400% 400%;

animation:btnMove 6s ease infinite;

cursor:pointer;
}

@keyframes btnMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.login-btn:hover{
transform:scale(1.05);
}

/* Register Button */

.register-btn{

width:100%;
padding:18px;
margin-top:18px;

font-size:18px;

border-radius:10px;

border:2px solid white;

background:transparent;
color:white;

cursor:pointer;
}

.register-btn:hover{
background:white;
color:#0f2027;
}

/* Flash Messages */

.flash{
margin-bottom:12px;
padding:10px;
border-radius:8px;
}

.error{
background:#ff4d4d;
}

.success{
background:#00c6ff;
}

</style>
</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="card">

<h2>Welcome</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="flash {{ category }}">
{{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button class="login-btn" type="submit">Login</button>

</form>

<button class="register-btn" onclick="window.location.href='/register'">
Create New Account
</button>

</div>

</body>
</html>
