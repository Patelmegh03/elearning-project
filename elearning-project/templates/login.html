<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            padding: 50px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            border: 1px solid #00c6ff;
            box-shadow: 0 0 25px #00c6ff;
            color: #00c6ff;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px #00c6ff;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            background: #0f2027;
            border: 1px solid #00c6ff;
            color: #00c6ff;
            border-radius: 8px;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 12px #00c6ff;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #00c6ff;
            color: #0f2027;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0096c7;
            box-shadow: 0 0 15px #00c6ff;
        }

        a {
            text-decoration: none;
            font-size: 16px;
            color: #00c6ff;
        }

        .flash {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .error {
            background-color: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
        }

        .success {
            background-color: rgba(0, 198, 255, 0.2);
            color: #00c6ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome Back 👋</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p><a href="/register">Create new account</a></p>
    </div>
</body>
</html>
