{% extends "base.html" %}
{% block content %}

<style>

.main-container{
width:100%;
margin-top:120px;
text-align:center;
}

/* ROWS */

.row{
display:flex;
justify-content:center;
gap:40px;
margin-bottom:40px;
flex-wrap:wrap;
}

/* COURSE BOX */

.box{

width:280px;
height:120px;

display:flex;
justify-content:center;
align-items:center;

font-size:18px;
font-weight:bold;

text-decoration:none;
color:white;

border-radius:15px;

padding:10px;

/* DASHBOARD GLASS THEME */

background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 20px 40px rgba(0,0,0,0.4);

transition:0.3s;
}

/* HOVER EFFECT */

.box:hover{

background:linear-gradient(270deg,#00c6ff,#0072ff);

transform:scale(1.07);

box-shadow:0 0 20px #00c6ff;

}

</style>


<div class="main-container">

<!-- FIRST ROW -->

<div class="row">

{% for folder in folders[0:3] %}

<a href="/folder/{{ folder }}" class="box">
📂 {{ folder }}
</a>

{% endfor %}

</div>


<!-- SECOND ROW -->

<div class="row">

{% for folder in folders[3:5] %}

<a href="/folder/{{ folder }}" class="box">
📂 {{ folder }}
</a>

{% endfor %}

</div>

</div>

{% endblock %}
