{% extends "base.html" %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.folder-box {
    background: white;
    width: 500px;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    box-shadow: 0 0 20px #00c6ff;
    transition: 0.3s;
}

.folder-box a {
    text-decoration: none;
    color: black;
}

.folder-box:hover {
    background: #00c6ff;
    color: white;
    transform: scale(1.05);
}
</style>

<div class="container">
    <div class="folder-box">
        <a href="{{ url_for('cloud') }}">
            📂 Cloud Computing
        </a>
    </div>
</div>

{% endblock %}
