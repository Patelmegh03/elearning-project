{% extends "base.html" %}
{% block content %}

<style>
.main-container {
    width: 100%;
    margin-top: 100px;
    text-align: center;
}

.row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
}

.box {
    width: 280px;
    height: 120px;
    background: white;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    color: black;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 10px;

    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.box:hover {
    background: #00c6ff;
    color: white;
    transform: scale(1.05);
}

h2 {
    margin-bottom: 50px;
}
</style>

<div class="main-container">

<h2>{{ folder_name }}</h2>

    <!-- FIRST ROW (3) -->
    <div class="row">
        {% for file in files[0:3] %}
            <a href="{{ url_for('static', filename=folder_name + '/' + file) }}"
               target="_blank" class="box">
                📄 {{ file.replace('.pdf','') }}
            </a>
        {% endfor %}
    </div>

    <!-- SECOND ROW (2) -->
    <div class="row">
        {% for file in files[3:5] %}
            <a href="{{ url_for('static', filename=folder_name + '/' + file) }}"
               target="_blank" class="box">
                📄 {{ file.replace('.pdf','') }}
            </a>
        {% endfor %}
    </div>

</div>

{% endblock %}
