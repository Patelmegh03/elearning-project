{% extends "base.html" %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

.box {
    background: rgba(0,0,0,0.85);
    padding: 60px;
    border-radius: 20px;
    width: 700px;
    text-align: center;
    box-shadow: 0 0 25px #00c6ff;
}

.box h2 {
    font-size: 45px;
    color: #00c6ff;
    margin-bottom: 40px;
}

.box ul {
    list-style: none;
    padding: 0;
}

.box li {
    margin: 20px 0;
}

.box a {
    display: block;
    background: white;
    color: black;
    font-size: 28px;
    font-weight: bold;
    padding: 18px;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s;
}

.box a:hover {
    background: #00c6ff;
    color: white;
    transform: scale(1.05);
}
</style>

<div class="container">
    <div class="box">
        <h2>Cloud Computing</h2>

        <ul>
            <li><a href="{{ url_for('static', filename='cloud_computing/UNIT-1.pdf') }}" target="_blank">UNIT 1</a></li>
            <li><a href="{{ url_for('static', filename='cloud_computing/UNIT-2.pdf') }}" target="_blank">UNIT 2</a></li>
            <li><a href="{{ url_for('static', filename='cloud_computing/UNIT-3.pdf') }}" target="_blank">UNIT 3</a></li>
            <li><a href="{{ url_for('static', filename='cloud_computing/UNIT-4.pdf') }}" target="_blank">UNIT 4</a></li>
            <li><a href="{{ url_for('static', filename='cloud_computing/UNIT-5.pdf') }}" target="_blank">UNIT 5</a></li>
        </ul>

    </div>
</div>

{% endblock %}
