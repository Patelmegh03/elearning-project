<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #185a9d;
            color: white;
            border: none;
            border-radius: 8px;
        }

        a {
            text-decoration: none;
            font-size: 16px;
            color: #185a9d;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <p><a href="/login">Already have account? Login</a></p>
    </div>
</body>
</html>
