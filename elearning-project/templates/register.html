<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001f3f, #003366);
            color: white;
        }

        .card {
            width: 380px;
            padding: 45px;
            border-radius: 15px;
            background: rgba(0, 198, 255, 0.08);
            border: 2px solid #00c6ff;
            box-shadow: 0 0 25px #00c6ff;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #00c6ff;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 14px 0;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #00c6ff;
            background: transparent;
            color: white;
        }

        input::placeholder {
            color: #aaa;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00c6ff;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background: #00c6ff;
            color: #001f3f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background: #00a6d6;
        }

        a {
            display: block;
            margin-top: 18px;
            text-decoration: none;
            color: #00c6ff;
        }

        a:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Your Account</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Your Account</button>
        </form>

        <a href="/login">Back to Login</a>
    </div>

</body>
</html>
