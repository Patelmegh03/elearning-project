<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: Arial, sans-serif;
overflow:hidden;

/* animated background */

background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1c92d2);
background-size:600% 600%;
animation:bgMove 6s linear infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating clouds */

.cloud{
position:absolute;
background:white;
border-radius:50px;
opacity:0.15;
animation:cloudMove linear infinite;
}

.cloud:before,
.cloud:after{
content:"";
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:200px;
height:60px;
top:20%;
left:-250px;
animation-duration:25s;
}

.cloud1:before{
width:80px;
height:80px;
top:-40px;
left:30px;
}

.cloud1:after{
width:100px;
height:100px;
top:-50px;
right:30px;
}

.cloud2{
width:250px;
height:70px;
top:60%;
left:-300px;
animation-duration:35s;
}

.cloud2:before{
width:90px;
height:90px;
top:-45px;
left:40px;
}

.cloud2:after{
width:110px;
height:110px;
top:-55px;
right:40px;
}

@keyframes cloudMove{
0%{transform:translateX(0)}
100%{transform:translateX(160vw)}
}

/* card */

.card{
width:500px;
padding:60px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
border-radius:20px;
box-shadow:0 30px 70px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
color:white;
}

/* title */

h2{
font-size:34px;
margin-bottom:30px;
}

/* labels */

label{
display:block;
text-align:left;
margin-bottom:6px;
font-size:14px;
}

/* inputs */

input{
width:100%;
padding:18px;
margin-bottom:18px;
border-radius:10px;
border:none;
font-size:16px;
background:rgba(255,255,255,0.9);
}

/* create button */

.create-btn{
width:100%;
padding:18px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:10px;
color:white;
background:linear-gradient(270deg,#00c6ff,#0072ff,#00c6ff);
background-size:400% 400%;
animation:btnMove 6s ease infinite;
cursor:pointer;
}

@keyframes btnMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.create-btn:hover{
transform:scale(1.05);
}

/* back to login */

.login-btn{
width:100%;
padding:18px;
margin-top:18px;
font-size:18px;
border-radius:10px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
}

.login-btn:hover{
background:white;
color:#0f2027;
}

</style>
</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="card">

<h2>Create Account</h2>

<form method="POST">

<label for="username">Username</label>
<input id="username" type="text" name="username" placeholder="Enter Username" required>

<label for="password">Password</label>
<input id="password" type="password" name="password" placeholder="Enter Password" required>

<button class="create-btn" type="submit">Create Account</button>

</form>

<button class="login-btn" onclick="window.location.href='/login'">
Back to Login
</button>

</div>

</body>
</html>
```
