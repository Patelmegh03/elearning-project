{% extends "base.html" %}
{% block content %}

<div style="display:flex; justify-content:center; margin-top:100px;">

<div style="background:white; padding:40px; width:400px; text-align:center; border-radius:15px;">

<h2>Add New Course</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Course Title" required><br><br>
    <input type="file" name="pdf" accept=".pdf" required><br><br>
    <button type="submit">Upload Course</button>
</form>

</div>
</div>

{% endblock %}
