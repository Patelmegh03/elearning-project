<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>

/* GLOBAL */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1c92d2);
background-size:600% 600%;
animation:bgMove 8s linear infinite;
color:white;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* CLOUDS */

.cloud{
position:absolute;
background:white;
border-radius:50px;
opacity:0.15;
animation:cloudMove linear infinite;
}

.cloud:before,
.cloud:after{
content:"";
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:200px;
height:60px;
top:20%;
left:-250px;
animation-duration:30s;
}

.cloud1:before{
width:80px;
height:80px;
top:-40px;
left:30px;
}

.cloud1:after{
width:100px;
height:100px;
top:-50px;
right:30px;
}

.cloud2{
width:250px;
height:70px;
top:60%;
left:-300px;
animation-duration:40s;
}

.cloud2:before{
width:90px;
height:90px;
top:-45px;
left:40px;
}

.cloud2:after{
width:110px;
height:110px;
top:-55px;
right:40px;
}

@keyframes cloudMove{
0%{transform:translateX(0);}
100%{transform:translateX(160vw);}
}


/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.navbar strong{
font-size:20px;
}

.navbar a{
text-decoration:none;
margin-left:25px;
font-weight:bold;
color:white;
transition:0.3s;
}

.navbar a:hover{
color:#00c6ff;
}


/* CENTER */

.container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}


/* MAIN PROFILE BOX */

.profile-box{

width:520px;
padding:45px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

border-radius:20px;

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 30px 70px rgba(0,0,0,0.6);

text-align:center;
}


/* TITLE */

.profile-box h1{
font-size:30px;
margin-bottom:30px;
}


/* INPUTS */

input{

width:90%;
padding:14px;
margin:12px auto;

display:block;

border-radius:8px;
border:none;

font-size:16px;

background:rgba(255,255,255,0.9);
color:black;
}


/* BUTTON */

button{

width:50%;
padding:12px;

margin-top:10px;

font-size:15px;
font-weight:bold;

border:none;
border-radius:8px;

color:white;

background:linear-gradient(270deg,#00c6ff,#0072ff,#00c6ff);
background-size:400% 400%;

animation:btnMove 6s ease infinite;

cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

@keyframes btnMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* DIVIDER */

hr{
margin:30px 0;
border:1px solid rgba(255,255,255,0.2);
}

</style>
</head>


<body>

<!-- CLOUDS -->

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>


<!-- NAVBAR -->

<div class="navbar">

<strong>E-Learning</strong>

<div>
<a href="/dashboard">Dashboard</a>
<a href="/courses">Courses</a>
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>
</div>

</div>


<!-- PROFILE AREA -->

<div class="container">

<div class="profile-box">

<h1>Profile Settings</h1>


<!-- CHANGE USERNAME -->

<form method="POST">

<input type="hidden" name="action" value="username">

<input type="text" name="new_username" placeholder="New Username" required>

<button type="submit">Update Username</button>

</form>


<hr>


<!-- CHANGE PASSWORD -->

<form method="POST">

<input type="hidden" name="action" value="password">

<input type="password" name="current_password" placeholder="Current Password" required>

<input type="password" name="new_password" placeholder="New Password" required>

<button type="submit">Update Password</button>

</form>


</div>

</div>

</body>
</html>
