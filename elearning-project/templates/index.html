<!DOCTYPE html>
<html>
<head>
    <title>E-Learning Platform</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #00c6ff;
            text-align: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            padding: 60px;
            border-radius: 15px;
            width: 500px;
            border: 1px solid #00c6ff;
            box-shadow: 0 0 30px #00c6ff;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00c6ff;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            padding: 15px 40px;
            background: #00c6ff;
            color: #0f2027;
            text-decoration: none;
            font-size: 18px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background: #0096c7;
            box-shadow: 0 0 20px #00c6ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cloud E-Learning Platform 🚀</h1>
        <p>Learn Anytime, Anywhere</p>
        <a href="/login">Get Started</a>
    </div>
</body>
</html>
