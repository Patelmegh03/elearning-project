<!DOCTYPE html>
<html>
<head>
    <title>E-Learning Platform</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding: 60px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            width: 500px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
        }

        a {
            display: inline-block;
            margin: 15px;
            padding: 15px 35px;
            background: white;
            color: #333;
            text-decoration: none;
            font-size: 18px;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cloud E-Learning Platform 🚀</h1>
        <p>Learn Anytime, Anywhere</p>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</body>
</html>
